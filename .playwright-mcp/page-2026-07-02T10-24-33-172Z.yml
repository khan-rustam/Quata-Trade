        - generic [ref=f3e76]:
          - heading "3. Your account & security" [level=2] [ref=f3e77]
          - generic [ref=f3e78]:
            - paragraph [ref=f3e79]: You are responsible for your login credentials, your transaction PIN, and your two-factor authentication (2FA). 2FA is required to withdraw funds and to release escrow. Never share these. Tell us immediately if you suspect unauthorized access.
            - paragraph [ref=f3e80]: We may suspend, freeze, or close an account to protect users, comply with law, or investigate suspected fraud or breach of these terms, as described in our Prohibited Use Policy.
        - generic [ref=f3e81]:
          - heading "4. How trading works" [level=2] [ref=f3e82]
          - generic [ref=f3e83]:
            - paragraph [ref=f3e84]: A seller lists an offer; when a buyer opens a trade, the seller’s USDT is locked in escrow. The buyer pays the seller off-platform and submits proof. The seller confirms receipt in their own account, and escrow releases the crypto to the buyer minus the trading fee. If the payment window expires without confirmation, escrow returns to the seller. Full mechanics are in the Trade & Escrow Rules.
            - paragraph [ref=f3e85]: You authorize QuataTrade to lock, release, refund, or — in a dispute — award escrowed crypto strictly according to the outcomes described in the Trade & Escrow Rules and Dispute Policy. Admin dispute decisions are final within the platform.
        - generic [ref=f3e86]:
          - heading "5. Fees" [level=2] [ref=f3e87]
          - paragraph [ref=f3e89]: "Trading fees are charged in crypto from the trade amount and are published in full on the Fees page: 0.3% for QuataPay, 0.5% for MTN Mobile Money, 0.5% for Orange Money. Blockchain network fees apply to withdrawals. There are no hidden fees."
        - generic [ref=f3e90]:
          - heading "6. Prohibited conduct" [level=2] [ref=f3e91]
          - paragraph [ref=f3e93]: You must not use QuataTrade for fraud, money laundering, sanctions evasion, third-party payments (paying from an account not in your own name), operating multiple accounts to evade limits, or trading proceeds of crime. See the Prohibited Use Policy.
        - generic [ref=f3e94]:
          - heading "7. Risk & no advice" [level=2] [ref=f3e95]
          - paragraph [ref=f3e97]: Crypto assets are volatile and blockchain transactions are irreversible. Nothing on QuataTrade is investment, legal, or tax advice. See the Risk Disclosure.

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · QuataTrade</title>
    <!-- Static offline fallback served by the service worker. Self-contained (no app
         CSS/JS, since we may be offline). Brand tokens inlined to match the dark theme. -->
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background: #0e1416; color: #e7edeb; padding: 24px;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card { max-width: 420px; text-align: center; }
      .badge {
        width: 56px; height: 56px; margin: 0 auto 20px; border-radius: 16px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(47, 212, 167, 0.14); color: #2fd4a7;
      }
      h1 { font-size: 22px; margin: 0 0 8px; letter-spacing: -0.01em; }
      p { color: #9fb3ae; line-height: 1.5; margin: 0 0 24px; }
      button {
        appearance: none; border: 0; cursor: pointer; font: inherit; font-weight: 600;
        background: #2fd4a7; color: #06110e; padding: 12px 20px; border-radius: 10px;
      }
      button:focus-visible { outline: 2px solid #2fd4a7; outline-offset: 2px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22" /><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" /><path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" /><line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>QuataTrade needs an internet connection. Your funds and account are safe — reconnect and try again.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>

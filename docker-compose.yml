name: quatatrade

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quatatrade
      POSTGRES_PASSWORD: quatatrade_dev_only
      POSTGRES_DB: quatatrade
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quatatrade -d quatatrade"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: quatatrade
      MINIO_ROOT_PASSWORD: quatatrade_dev_only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # creates the private buckets on first run
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 quatatrade quatatrade_dev_only &&
      mc mb --ignore-existing local/kyc local/proofs local/disputes local/chat &&
      exit 0"

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    profiles: ["full"]
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  pg_data:
  redis_data:
  minio_data:
  clamav_data:
